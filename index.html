<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de Vacaciones | SITT – Ayuntamiento de Tijuana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Aplicar tema México ANTES de que React cargue
      if (localStorage.getItem('mx-tema') === '1') {
        var s = document.createElement('style');
        s.id = 'mx-style';
        s.textContent = [
          ':root{--g:#006847!important;--d:#CE1126!important;--d-dk:#a30d1e!important;',
          '--g-soft:rgba(0,104,71,0.07)!important;--g10:rgba(0,104,71,0.1)!important;',
          '--g20:rgba(0,104,71,0.2)!important;--g60:rgba(0,104,71,0.6)!important;}',
          '.dash-header{background:rgba(0,61,42,0.97)!important;',
          'border-bottom:1px solid rgba(206,17,38,0.4)!important;',
          'box-shadow:0 4px 30px rgba(0,40,25,0.5)!important;}',
          '.bottom-nav{background:rgba(0,40,25,0.97)!important;',
          'border-top:1px solid rgba(206,17,38,0.4)!important;',
          'box-shadow:0 -8px 40px rgba(0,40,25,0.5)!important;}',
          '.bottom-nav-item.active{background:rgba(206,17,38,0.15)!important;}',
          '.btn-institucional.filled{background:linear-gradient(135deg,#006847,#004d35)!important;}',
          '.btn-institucional.dorado{border-color:#CE1126!important;color:#CE1126!important;}'
        ].join('');
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
